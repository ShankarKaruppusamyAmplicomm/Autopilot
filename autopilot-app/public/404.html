<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <script>
    // GitHub Pages SPA redirect trick.
    // Encodes the full path into a query param and redirects to the root.
    var base = '/Autopilot';
    var path = window.location.pathname.replace(base, '') || '/';
    var search = window.location.search;
    var hash = window.location.hash;
    var redirectUrl = base + '/?p=' + encodeURIComponent(path + search + hash);
    window.location.replace(redirectUrl);
  </script>
</head>
<body></body>
</html>
